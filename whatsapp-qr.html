<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>WhatsApp Bridge — MechTrack QR Scanner</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #080c14;
            --surface: #0f1623;
            --card: #141c2e;
            --card-hover: #182035;
            --border: #1e2a42;
            --border-lit: #2e3f60;
            --gold: #e8b84b;
            --gold-dim: #c9962a;
            --gold-glow: rgba(232, 184, 75, 0.15);
            --teal: #26c6b0;
            --blue: #3b82f6;
            --red: #ef4444;
            --green: #22c55e;
            --amber: #f59e0b;
            --text: #e8eaf0;
            --text-2: #8492a8;
            --text-3: #4a5570;
            --radius: 20px;
            --radius-sm: 12px;
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 550px;
            width: 100%;
            margin: 0 auto;
        }

        /* Status Card */
        .status-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 24px;
            margin-bottom: 24px;
            text-align: center;
        }

        .status-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 20px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            transition: all 0.3s ease;
        }

        .status-icon.connecting {
            background: rgba(245, 158, 11, 0.15);
            border: 2px solid var(--amber);
            color: var(--amber);
            animation: pulse 1.5s infinite;
        }

        .status-icon.scanning {
            background: rgba(59, 130, 246, 0.15);
            border: 2px solid var(--blue);
            color: var(--blue);
            animation: pulse 1.5s infinite;
        }

        .status-icon.connected {
            background: rgba(34, 197, 94, 0.15);
            border: 2px solid var(--green);
            color: var(--green);
            animation: none;
        }

        .status-icon.error {
            background: rgba(239, 68, 68, 0.15);
            border: 2px solid var(--red);
            color: var(--red);
            animation: none;
        }

        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
                opacity: 1;
            }
            50% {
                transform: scale(1.05);
                opacity: 0.8;
            }
        }

        .status-title {
            font-family: 'Syne', sans-serif;
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 8px;
        }

        .status-message {
            color: var(--text-2);
            font-size: 14px;
            margin-bottom: 16px;
        }

        .status-detail {
            background: var(--card);
            border-radius: var(--radius-sm);
            padding: 12px;
            margin-top: 16px;
            font-size: 12px;
            color: var(--text-3);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .status-detail-label {
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .status-detail-value {
            font-family: monospace;
            color: var(--gold);
        }

        /* QR Card */
        .qr-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 32px;
            text-align: center;
            margin-bottom: 24px;
            transition: all 0.3s ease;
        }

        .qr-card.hidden {
            display: none;
        }

        .qr-container {
            background: white;
            padding: 20px;
            border-radius: 16px;
            display: inline-block;
            margin-bottom: 20px;
            box-shadow: var(--shadow);
        }

        .qr-code {
            width: 250px;
            height: 250px;
            display: block;
            margin: 0 auto;
        }

        .qr-placeholder {
            width: 250px;
            height: 250px;
            background: var(--card);
            border: 2px dashed var(--border);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            color: var(--text-3);
            font-size: 48px;
        }

        .qr-title {
            font-family: 'Syne', sans-serif;
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .qr-instruction {
            color: var(--text-2);
            font-size: 13px;
            line-height: 1.5;
        }

        .qr-instruction i {
            color: var(--gold);
            margin-right: 6px;
        }

        /* Button */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 24px;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: all 0.25s;
            font-family: 'DM Sans', sans-serif;
            width: 100%;
            justify-content: center;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--gold), var(--gold-dim));
            color: #0a0a0a;
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(232, 184, 75, 0.35);
        }

        .btn-secondary {
            background: var(--card);
            color: var(--text-2);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover:not(:disabled) {
            border-color: var(--border-lit);
            color: var(--text);
        }

        .btn-danger {
            background: rgba(239, 68, 68, 0.1);
            color: var(--red);
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        .btn-danger:hover:not(:disabled) {
            background: rgba(239, 68, 68, 0.2);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        /* Steps Indicator */
        .steps {
            display: flex;
            justify-content: space-between;
            margin-bottom: 32px;
            position: relative;
        }

        .steps::before {
            content: '';
            position: absolute;
            top: 20px;
            left: 10%;
            right: 10%;
            height: 2px;
            background: var(--border);
            z-index: 0;
        }

        .step {
            flex: 1;
            text-align: center;
            position: relative;
            z-index: 1;
        }

        .step-circle {
            width: 40px;
            height: 40px;
            background: var(--card);
            border: 2px solid var(--border);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 8px;
            font-weight: 700;
            color: var(--text-3);
            transition: all 0.3s ease;
        }

        .step.active .step-circle {
            background: var(--gold);
            border-color: var(--gold);
            color: #0a0a0a;
            transform: scale(1.1);
        }

        .step.completed .step-circle {
            background: var(--green);
            border-color: var(--green);
            color: white;
        }

        .step-label {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-3);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .step.active .step-label {
            color: var(--gold);
        }

        .step.completed .step-label {
            color: var(--green);
        }

        /* Logs */
        .logs-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
        }

        .logs-header {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logs-title {
            font-family: 'Syne', sans-serif;
            font-size: 14px;
            font-weight: 700;
        }

        .clear-logs {
            background: none;
            border: none;
            color: var(--text-3);
            cursor: pointer;
            font-size: 12px;
            padding: 4px 8px;
            border-radius: 6px;
            transition: all 0.2s;
        }

        .clear-logs:hover {
            background: var(--card);
            color: var(--text);
        }

        .logs-container {
            max-height: 200px;
            overflow-y: auto;
            padding: 12px;
        }

        .log-entry {
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 12px;
            margin-bottom: 6px;
            font-family: monospace;
            display: flex;
            gap: 10px;
            align-items: flex-start;
        }

        .log-time {
            color: var(--text-3);
            flex-shrink: 0;
            font-size: 10px;
        }

        .log-message {
            color: var(--text-2);
            flex: 1;
        }

        .log-entry.success {
            background: rgba(34, 197, 94, 0.05);
            border-left: 2px solid var(--green);
        }

        .log-entry.error {
            background: rgba(239, 68, 68, 0.05);
            border-left: 2px solid var(--red);
        }

        .log-entry.info {
            background: rgba(59, 130, 246, 0.05);
            border-left: 2px solid var(--blue);
        }

        /* Spinner */
        .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid rgba(232, 184, 75, 0.2);
            border-top-color: var(--gold);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            display: inline-block;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Responsive */
        @media (max-width: 600px) {
            body {
                padding: 12px;
            }
            
            .qr-code, .qr-placeholder {
                width: 200px;
                height: 200px;
            }
            
            .step-label {
                font-size: 9px;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <!-- Steps Indicator -->
    <div class="steps">
        <div class="step" id="stepInit">
            <div class="step-circle">1</div>
            <div class="step-label">Initialize</div>
        </div>
        <div class="step" id="stepQR">
            <div class="step-circle">2</div>
            <div class="step-label">Scan QR</div>
        </div>
        <div class="step" id="stepConnect">
            <div class="step-circle">3</div>
            <div class="step-label">Connect</div>
        </div>
        <div class="step" id="stepReady">
            <div class="step-circle">4</div>
            <div class="step-label">Ready</div>
        </div>
    </div>

    <!-- Status Card -->
    <div class="status-card">
        <div class="status-icon" id="statusIcon">
            <i class="fas fa-wifi"></i>
        </div>
        <div class="status-title" id="statusTitle">Initializing...</div>
        <div class="status-message" id="statusMessage">Starting WhatsApp bridge connection</div>
        <div class="status-detail">
            <span class="status-detail-label">Bridge Status</span>
            <span class="status-detail-value" id="bridgeStatus">Checking...</span>
        </div>
    </div>

    <!-- QR Card -->
    <div class="qr-card hidden" id="qrCard">
        <div class="qr-container">
            <img id="qrImage" class="qr-code" alt="QR Code">
        </div>
        <div class="qr-title">Scan with WhatsApp</div>
        <div class="qr-instruction">
            <i class="fab fa-whatsapp"></i>
            Open WhatsApp → Settings → Linked Devices → Link a Device
        </div>
    </div>

    <!-- Action Buttons -->
    <div style="display: flex; gap: 12px; margin-bottom: 24px;">
        <button class="btn btn-secondary" id="refreshBtn" style="flex: 1;">
            <i class="fas fa-sync-alt"></i> Refresh Status
        </button>
        <button class="btn btn-danger" id="resetBtn" style="flex: 1;">
            <i class="fas fa-trash-alt"></i> Reset Connection
        </button>
    </div>

    <!-- Logs -->
    <div class="logs-card">
        <div class="logs-header">
            <div class="logs-title">
                <i class="fas fa-history" style="margin-right: 8px;"></i>
                Connection Logs
            </div>
            <button class="clear-logs" id="clearLogsBtn">
                <i class="fas fa-trash"></i> Clear
            </button>
        </div>
        <div class="logs-container" id="logsContainer">
            <div class="log-entry info">
                <span class="log-time">--:--:--</span>
                <span class="log-message">Initializing connection monitor...</span>
            </div>
        </div>
    </div>
</div>

<script>
const API_BASE = 'https://mech-production-30d8.up.railway.app';
// const API_BASE = 'http://localhost:4321'; // For local testing

let pollInterval = null;
let logs = [];

function addLog(message, type = 'info') {
    const time = new Date().toLocaleTimeString('en-IN');
    logs.unshift({ time, message, type });
    
    // Keep only last 50 logs
    if (logs.length > 50) logs.pop();
    
    renderLogs();
}

function renderLogs() {
    const container = document.getElementById('logsContainer');
    if (!container) return;
    
    if (logs.length === 0) {
        container.innerHTML = '<div class="log-entry info"><span class="log-time">--:--:--</span><span class="log-message">No logs yet</span></div>';
        return;
    }
    
    container.innerHTML = logs.map(log => `
        <div class="log-entry ${log.type}">
            <span class="log-time">${log.time}</span>
            <span class="log-message">${escapeHtml(log.message)}</span>
        </div>
    `).join('');
    
    // Auto-scroll to top (newest logs)
    container.scrollTop = 0;
}

function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

function updateSteps(currentStep) {
    const steps = ['init', 'qr', 'connect', 'ready'];
    steps.forEach((step, index) => {
        const element = document.getElementById(`step${step.charAt(0).toUpperCase() + step.slice(1)}`);
        if (!element) return;
        
        element.classList.remove('active', 'completed');
        
        if (index < steps.indexOf(currentStep)) {
            element.classList.add('completed');
        } else if (index === steps.indexOf(currentStep)) {
            element.classList.add('active');
        }
    });
}

async function checkConnectionStatus() {
    try {
        addLog('Checking connection status...', 'info');
        
        // Try to get status from main API
        const response = await fetch(`${API_BASE}/whatsapp/status`);
        const data = await response.json();
        
        console.log('Status response:', data);
        
        const isConnected = data.ready === true;
        const isConnecting = data.connecting === true;
        const bridgeUrl = data.bridge_url || 'Unknown';
        
        document.getElementById('bridgeStatus').textContent = isConnected ? 'CONNECTED' : (isConnecting ? 'CONNECTING...' : 'DISCONNECTED');
        
        const icon = document.getElementById('statusIcon');
        const title = document.getElementById('statusTitle');
        const message = document.getElementById('statusMessage');
        
        if (isConnected) {
            icon.className = 'status-icon connected';
            icon.innerHTML = '<i class="fas fa-check-circle"></i>';
            title.textContent = 'Connected!';
            message.textContent = 'WhatsApp is ready to send and receive messages';
            updateSteps('ready');
            
            // Hide QR card if connected
            document.getElementById('qrCard').classList.add('hidden');
            
            addLog('✅ WhatsApp connected successfully! Bridge is ready.', 'success');
            
            // Stop polling if connected
            if (pollInterval) {
                clearInterval(pollInterval);
                pollInterval = null;
            }
        } else if (isConnecting) {
            icon.className = 'status-icon connecting';
            icon.innerHTML = '<i class="fas fa-spinner fa-pulse"></i>';
            title.textContent = 'Connecting...';
            message.textContent = 'Setting up WhatsApp bridge';
            updateSteps('init');
            addLog('⏳ Bridge is initializing...', 'info');
        } else {
            icon.className = 'status-icon scanning';
            icon.innerHTML = '<i class="fas fa-qrcode"></i>';
            title.textContent = 'Ready to Scan';
            message.textContent = 'Generate QR code to connect your WhatsApp';
            updateSteps('qr');
            
            // Show QR card and fetch QR
            document.getElementById('qrCard').classList.remove('hidden');
            await fetchQRCode();
        }
        
        return isConnected;
    } catch (error) {
        console.error('Status check error:', error);
        addLog(`❌ Failed to check status: ${error.message}`, 'error');
        
        document.getElementById('statusIcon').className = 'status-icon error';
        document.getElementById('statusIcon').innerHTML = '<i class="fas fa-exclamation-triangle"></i>';
        document.getElementById('statusTitle').textContent = 'Connection Error';
        document.getElementById('statusMessage').textContent = 'Cannot reach bridge service';
        document.getElementById('bridgeStatus').textContent = 'OFFLINE';
        
        return false;
    }
}

async function fetchQRCode() {
    try {
        addLog('Fetching QR code from bridge...', 'info');
        
        const response = await fetch(`${API_BASE}/whatsapp/status`);
        const data = await response.json();
        
        // If the bridge has a QR endpoint, try that
        if (data.bridge_url) {
            try {
                const qrResponse = await fetch(`${data.bridge_url}/qr`);
                const qrData = await qrResponse.json();
                
                if (qrData.qr && !qrData.ready) {
                    const qrImage = document.getElementById('qrImage');
                    qrImage.src = qrData.qr;
                    addLog('📱 QR code loaded. Scan with WhatsApp mobile app.', 'success');
                } else if (qrData.ready) {
                    addLog('✅ Bridge is already ready!', 'success');
                    await checkConnectionStatus();
                } else {
                    addLog('⚠️ No QR code available yet. Waiting for bridge...', 'info');
                }
            } catch (err) {
                addLog(`⚠️ Cannot fetch QR: ${err.message}`, 'error');
            }
        }
    } catch (error) {
        addLog(`❌ QR fetch error: ${error.message}`, 'error');
    }
}

async function resetConnection() {
    if (!confirm('⚠️ This will reset the WhatsApp connection. You will need to scan QR again. Continue?')) {
        return;
    }
    
    addLog('🔄 Resetting WhatsApp connection...', 'info');
    
    try {
        // Reset bridge
        const resetResponse = await fetch(`${API_BASE}/whatsapp/reset`, {
            method: 'POST'
        });
        
        if (resetResponse.ok) {
            addLog('✅ Bridge reset initiated', 'success');
            
            // Update UI
            document.getElementById('statusIcon').className = 'status-icon connecting';
            document.getElementById('statusIcon').innerHTML = '<i class="fas fa-spinner fa-pulse"></i>';
            document.getElementById('statusTitle').textContent = 'Resetting...';
            document.getElementById('statusMessage').textContent = 'Bridge is restarting';
            updateSteps('init');
            
            // Clear QR display
            document.getElementById('qrCard').classList.add('hidden');
            
            // Re-check status after reset
            setTimeout(() => {
                checkConnectionStatus();
            }, 3000);
        } else {
            addLog('❌ Failed to reset bridge', 'error');
        }
    } catch (error) {
        addLog(`❌ Reset error: ${error.message}`, 'error');
    }
}

function startPolling() {
    if (pollInterval) clearInterval(pollInterval);
    
    // Initial check
    checkConnectionStatus();
    
    // Poll every 5 seconds
    pollInterval = setInterval(() => {
        checkConnectionStatus();
    }, 5000);
}

function stopPolling() {
    if (pollInterval) {
        clearInterval(pollInterval);
        pollInterval = null;
    }
}

// Event listeners
document.getElementById('refreshBtn').addEventListener('click', () => {
    addLog('🔄 Manual refresh triggered', 'info');
    checkConnectionStatus();
});

document.getElementById('resetBtn').addEventListener('click', resetConnection);

document.getElementById('clearLogsBtn').addEventListener('click', () => {
    logs = [];
    addLog('Logs cleared', 'info');
});

// Initialize
addLog('🚀 WhatsApp Bridge Monitor Started', 'success');
addLog(`API Endpoint: ${API_BASE}`, 'info');
startPolling();

// Cleanup on page unload
window.addEventListener('beforeunload', () => {
    stopPolling();
});
</script>
</body>
</html>
